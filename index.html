<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rare Disease Support Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --emerald-50: #ecfdf5;
      --emerald-100: #d1fae5;
      --emerald-200: #a7f3d0;
      --emerald-300: #6ee7b7;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --emerald-800: #065f46;
      --emerald-900: #064e3b;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f0fdf8;
      color: #1e293b;
      margin: 0;
      padding: 0;
    }

    .hero-bg {
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(16,185,129,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(52,211,153,0.10) 0%, transparent 60%),
        linear-gradient(160deg, #f0fdf8 0%, #ecfdf5 40%, #d1fae5 100%);
    }

    .card {
      background: #ffffff;
      border: 1px solid #a7f3d0;
      border-radius: 1.25rem;
      transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .card:hover {
      box-shadow: 0 12px 40px rgba(16,185,129,0.18), 0 4px 12px rgba(0,0,0,0.06);
      transform: translateY(-4px);
      border-color: #34d399;
    }

    .card:hover::before {
      opacity: 1;
    }

    .icon-wrapper {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-open {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.55rem 1.4rem;
      border-radius: 0.65rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .btn-open:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .qr-box {
      width: 76px;
      height: 76px;
      border-radius: 10px;
      background: #f0fdf8;
      border: 1.5px dashed #a7f3d0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .qr-label {
      font-size: 0.6rem;
      color: #6ee7b7;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .stat-chip {
      background: rgba(255,255,255,0.75);
      border: 1px solid #a7f3d0;
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.82rem;
      color: #047857;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #10b981;
    }

    .divider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6ee7b7;
      display: inline-block;
      margin: 0 6px;
      vertical-align: middle;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    .footer-bg {
      background: linear-gradient(160deg, #064e3b 0%, #065f46 100%);
    }

    @media (max-width: 640px) {
      .hero-title { font-size: 2.2rem !important; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const apps = [
  {
    id: 1,
    title: "IgG4-RD 診断支援",
    url: "https://ig-g4-rd-diagnosis.vercel.app",
    description: "日本の診断基準（2020年改訂）に基づき、IgG4関連疾患の診断をサポートします。",
    badge: "診断支援",
    icon: "stethoscope",
    color: "#059669",
    qrSrc: "./qr/qr_diagnosis.png",
  },
  {
    id: 2,
    title: "IgG4-RD 分類基準スコアリング",
    url: "https://igg4-rd-criteria.vercel.app",
    description: "ACR/EULAR 2019 分類基準に基づき、ポイント算出と分類判定を自動化します。",
    badge: "スコアリング",
    icon: "clipboard-list",
    color: "#047857",
    qrSrc: "./qr/qr_scoring.png",
  },
  {
    id: 3,
    title: "IgG4-RD 医療費自己負担シミュレーター",
    url: "https://g4-cost.vercel.app/",
    description: "指定難病や高額療養費制度を考慮した、ユプリズナ等の年間医療費を算出します。",
    badge: "費用試算",
    icon: "calculator",
    color: "#0d9488",
    qrSrc: "./qr/qr_g4cost.png",
  },
  {
    id: 4,
    title: "NMOSD 医療費自己負担シミュレーター",
    url: "https://nmosd-expenses.vercel.app",
    description: "視神経脊髄炎（NMOSD）における各種製剤の年間・月間の自己負担額を試算します。",
    badge: "費用試算",
    icon: "syringe",
    color: "#0891b2",
    qrSrc: "./qr/qr_nmosd_cost.png",
  },
  {
    id: 5,
    title: "NMOSD 外来点数シミュレーター",
    url: "https://tanpaku-collab-nmosd-score-calc-fin.vercel.app/",
    description: "軽症高額特例の適用に必要な外来点数を、処方内容や検査項目から算出します。",
    badge: "点数算出",
    icon: "file-text",
    color: "#7c3aed",
    qrSrc: "./qr/qr_nmosd_score.png",
  },
];

const iconMap = {
  "stethoscope": `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg>`,
  "clipboard-list": `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>`,
  "calculator": `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>`,
  "syringe": `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/></svg>`,
  "file-text": `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>`,
  "external-link": `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>`,
};

function SVGIcon({ name, color }) {
  return (
    <span
      style={{ color: color || '#059669', display: 'flex', alignItems: 'center' }}
      dangerouslySetInnerHTML={{ __html: iconMap[name] || '' }}
    />
  );
}

function QRPlaceholder({ src, alt }) {
  return (
    <div className="qr-box">
      <img
        src={src}
        alt={alt || "QR Code"}
        onError={(e) => {
          e.target.style.display = 'none';
          e.target.parentNode.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a7f3d0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/>
              <path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/>
            </svg>
            <span style="font-size:0.58rem;color:#a7f3d0;margin-top:4px;text-align:center;line-height:1.3;">QR<br/>Code</span>
          `;
        }}
      />
    </div>
  );
}

function AppCard({ app, delay }) {
  return (
    <div className={`card p-5 flex flex-col gap-4 fade-up delay-${delay}`}>
      {/* Top: icon + badge */}
      <div className="flex items-start justify-between gap-3">
        <div className="icon-wrapper">
          <SVGIcon name={app.icon} color={app.color} />
        </div>
        <span className="badge">{app.badge}</span>
      </div>

      {/* Title */}
      <div>
        <h3 style={{
          fontSize: '1.02rem',
          fontWeight: 700,
          color: '#0f172a',
          lineHeight: 1.4,
          margin: 0,
          letterSpacing: '-0.01em',
        }}>
          {app.title}
        </h3>
        <p style={{
          fontSize: '0.83rem',
          color: '#475569',
          lineHeight: 1.7,
          marginTop: '0.4rem',
          marginBottom: 0,
          fontWeight: 400,
        }}>
          {app.description}
        </p>
      </div>

      {/* Bottom: button + QR */}
      <div className="flex items-end justify-between gap-3 mt-auto">
        <a
          href={app.url}
          target="_blank"
          rel="noopener noreferrer"
          className="btn-open"
        >
          <span dangerouslySetInnerHTML={{ __html: iconMap['external-link'] }} />
          ツールを開く
        </a>
        <div style={{ textAlign: 'center' }}>
          <QRPlaceholder src={app.qrSrc} alt={`${app.title} QR`} />
          <div style={{ fontSize: '0.62rem', color: '#a7f3d0', marginTop: '4px', letterSpacing: '0.04em' }}>QR CODE</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Header */}
      <header style={{
        background: 'rgba(240,253,248,0.92)',
        backdropFilter: 'blur(12px)',
        borderBottom: '1px solid #a7f3d0',
        position: 'sticky',
        top: 0,
        zIndex: 50,
      }}>
        <div style={{ maxWidth: '900px', margin: '0 auto', padding: '0.8rem 1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
            <div style={{ width: 32, height: 32, borderRadius: 10, background: 'linear-gradient(135deg,#059669,#34d399)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              </svg>
            </div>
            <span style={{ fontWeight: 700, fontSize: '0.9rem', color: '#065f46', letterSpacing: '0.01em' }}>
              Rare Disease Tools
            </span>
          </div>
          <span style={{ fontSize: '0.72rem', color: '#6ee7b7', fontWeight: 500, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
            Medical Portal
          </span>
        </div>
      </header>

      {/* Hero */}
      <section className="hero-bg" style={{ padding: '4.5rem 1.5rem 3.5rem' }}>
        <div style={{ maxWidth: '720px', margin: '0 auto', textAlign: 'center' }}>
          <div className="fade-up" style={{ marginBottom: '1.2rem' }}>
            <span className="stat-chip">
              <span style={{ marginRight: 6, display: 'inline-block' }}>🏥</span>
              医療従事者・患者さん向け意思決定支援ツール
            </span>
          </div>

          <h1 className="hero-title fade-up delay-1" style={{
            fontSize: '3.2rem',
            color: '#0f172a',
            margin: '0 0 0.6rem',
          }}>
            Rare Disease<br />
            <span style={{ color: '#059669' }}>Support Tools</span>
          </h1>

          <p className="fade-up delay-2" style={{
            fontSize: '1.0rem',
            color: '#475569',
            lineHeight: 1.8,
            maxWidth: 520,
            margin: '0 auto 2rem',
            fontWeight: 400,
          }}>
            IgG4関連疾患・NMOSDを対象とした診断支援・費用試算ツールを提供します。
            <br />
            エビデンスに基づく情報で、より良い医療判断をサポートします。
          </p>

          <div className="fade-up delay-3" style={{ display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
            <span className="stat-chip">IgG4-RD</span>
            <span className="divider-dot"></span>
            <span className="stat-chip">NMOSD</span>
            <span className="divider-dot"></span>
            <span className="stat-chip">5 ツール</span>
          </div>
        </div>
      </section>

      {/* Cards */}
      <section style={{ maxWidth: '900px', margin: '0 auto', padding: '2.5rem 1.25rem 4rem' }}>
        <div className="fade-up delay-2" style={{ marginBottom: '1.5rem' }}>
          <span className="section-label">Available Tools</span>
          <div style={{ width: 36, height: 2, background: 'linear-gradient(90deg,#10b981,transparent)', marginTop: 6, borderRadius: 2 }}></div>
        </div>

        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(270px, 1fr))',
          gap: '1.1rem',
        }}>
          {apps.map((app, i) => (
            <AppCard key={app.id} app={app} delay={i + 1} />
          ))}
        </div>
      </section>

      {/* Footer */}
      <footer className="footer-bg" style={{ padding: '2.5rem 1.5rem' }}>
        <div style={{ maxWidth: '900px', margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: '1rem' }}>
            <div style={{ width: 24, height: 24, borderRadius: 7, background: 'rgba(255,255,255,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
              </svg>
            </div>
            <span style={{ fontSize: '0.78rem', fontWeight: 700, color: '#6ee7b7', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
              免責事項
            </span>
          </div>

          <p style={{ fontSize: '0.8rem', color: 'rgba(167,243,208,0.75)', lineHeight: 1.9, margin: '0 0 1.5rem', maxWidth: 680 }}>
            本サイトに掲載されているツールは、いずれも<strong style={{ color: '#a7f3d0' }}>概算・参考情報の提供を目的</strong>としており、
            確定的な診断結果や医療費の支払額を保証するものではありません。
            実際の診断・治療・費用については、必ず担当の医師または医療機関にご確認ください。
            本ツールの利用により生じたいかなる損害についても、制作者は責任を負いかねます。
          </p>

          <div style={{ borderTop: '1px solid rgba(107,188,150,0.2)', paddingTop: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 8 }}>
            <span style={{ fontSize: '0.75rem', color: 'rgba(167,243,208,0.5)' }}>
              © 2025 Rare Disease Support Tools. All rights reserved.
            </span>
            <span style={{ fontSize: '0.72rem', color: 'rgba(167,243,208,0.4)', letterSpacing: '0.06em' }}>
              FOR MEDICAL PROFESSIONALS &amp; PATIENTS
            </span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
