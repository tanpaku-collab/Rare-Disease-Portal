<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rare Disease Support Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    :root {
      --emerald-50: #ecfdf5;
      --emerald-100: #d1fae5;
      --emerald-200: #a7f3d0;
      --emerald-300: #6ee7b7;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --emerald-800: #065f46;
      --emerald-900: #064e3b;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #f0fdf8;
      color: #1e293b;
      margin: 0;
      padding: 0;
    }

    .hero-bg {
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(16,185,129,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(52,211,153,0.10) 0%, transparent 60%),
        linear-gradient(160deg, #f0fdf8 0%, #ecfdf5 40%, #d1fae5 100%);
    }

    .card {
      background: #ffffff;
      border: 1px solid #a7f3d0;
      border-radius: 1.25rem;
      transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #10b981, #34d399, #6ee7b7);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .card:hover {
      box-shadow: 0 12px 40px rgba(16,185,129,0.18), 0 4px 12px rgba(0,0,0,0.06);
      transform: translateY(-4px);
      border-color: #34d399;
    }

    .card:hover::before {
      opacity: 1;
    }

    .icon-wrapper {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-open {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.5rem 0.85rem;
      min-width: 0;
      border-radius: 0.65rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }
    .btn-open:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .qr-box {
      width: 96px;
      height: 96px;
      border-radius: 10px;
      background: #f0fdf8;
      border: 1.5px solid #a7f3d0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .qr-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .qr-label {
      font-size: 0.6rem;
      color: #6ee7b7;
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .stat-chip {
      background: rgba(255,255,255,0.75);
      border: 1px solid #a7f3d0;
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.82rem;
      color: #047857;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #10b981;
    }

    .divider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6ee7b7;
      display: inline-block;
      margin: 0 6px;
      vertical-align: middle;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }

    .footer-bg {
      background: linear-gradient(160deg, #064e3b 0%, #065f46 100%);
    }

    @media (max-width: 640px) {
      .hero-title { font-size: 2.2rem !important; }
    }
  </style>
</head>

function SVGIcon({ name, color }) {
  return (
    <span
      style={{ color: color || '#059669', display: 'flex', alignItems: 'center' }}
      dangerouslySetInnerHTML={{ __html: iconMap[name] || '' }}
    />
  );
}

function QRCanvas({ url }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (canvasRef.current && typeof QRious !== 'undefined') {
      new QRious({
        element: canvasRef.current,
        value: url,
        size: 96,
        backgroundAlpha: 1,
        foreground: '#0f172a',
        background: '#f0fdf8',
        level: 'M',
      });
    }
  }, [url]);
  return <canvas ref={canvasRef} style={{ width: '96px', height: '96px', borderRadius: '8px', display: 'block' }} />;
}

function QRPlaceholder({ src, alt, qrUrl }) {
  return (
    <div className="qr-box">
      {qrUrl ? (
        <QRCanvas url={qrUrl} />
      ) : (
        <img
          src={src}
          alt={alt || "QR Code"}
          style={{ width: '100%', height: '100%', objectFit: 'contain', borderRadius: '8px', display: 'block' }}
        />
      )}
    </div>
  );
}

function AppCard({ app, delay }) {
  return (
    <div className={`card p-5 flex flex-col gap-4 fade-up delay-${delay}`}>

      <div className="flex items-end justify-between gap-2 mt-auto" style={{ overflow: 'hidden', minWidth: 0 }}>

          <QRPlaceholder src={app.qrSrc} alt={`${app.title} QR`} qrUrl={app.qrUrl} />
